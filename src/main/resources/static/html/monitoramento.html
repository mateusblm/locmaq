<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento por Camera - LocMac</title>
    <link rel="stylesheet" href="../css/padrao.css">
</head>
<body>
<header class="main-header">
    <div class="logo">LocMac</div>
    <nav class="nav-links"></nav>
    <div class="user-info">
        <span id="user-role"></span>
        <img src="../imgs/images.png" class="user-image">
        <a href="../html/usuario.html"><span id="user-name"></span></a>
        <a href="/logout" class="logout-btn">Sair</a>
    </div>
</header>
<main>
    <section class="container">
        <h2>Monitoramento por Camera</h2>
        <h3 style="text-align:center;margin-top:0;">Camera ao vivo do ambiente LocMaq</h3>

        <div style="background:#f0f4f8;border:1px solid #e5e7eb;border-radius:10px;padding:18px;margin-bottom:20px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
                <div>
                    <strong>Status atual:</strong>
                    <span id="cameraStatusTexto" style="font-weight:bold;color:#374151;">Consultando...</span>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button type="button" id="ligarCameraBtn" class="edit-button">Ligar camera</button>
                    <button type="button" id="desligarCameraBtn" class="edit-button">Desligar camera</button>
                    <button type="button" id="reiniciarCameraBtn" class="edit-button">Reiniciar camera</button>
                    <button type="button" id="atualizarStatusBtn" class="edit-button">Atualizar status</button>
                </div>
            </div>
            <p id="cameraMensagem" style="color:#555;margin-top:12px;"></p>
            <pre id="cameraOutput" style="display:none;white-space:pre-wrap;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-top:12px;max-height:180px;overflow:auto;color:#374151;"></pre>
        </div>

        <div id="cameraDesligadaAviso" style="display:none;background:#fff3cd;color:#7a5c00;border:1px solid #ffe08a;border-radius:8px;padding:12px 16px;text-align:center;font-weight:bold;margin-bottom:18px;">
            Camera desligada pelo painel de monitoramento.
        </div>

        <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
            <button type="button" id="streamPrincipalBtn" class="edit-button">Stream principal</button>
            <button type="button" id="streamFallbackBtn" class="edit-button">Stream alternativo</button>
            <a id="abrirCameraLink" class="edit-button" target="_blank" rel="noopener" style="text-decoration:none;">Abrir camera</a>
        </div>

        <div style="background:#111827;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.12);width:100%;aspect-ratio:4/3;">
            <img
                    id="cameraStream"
                    alt="Camera ao vivo do ambiente LocMaq"
                    style="display:block;width:100%;height:100%;border:0;background:#111827;object-fit:cover;">
        </div>
    </section>
</main>
<script src="../js/menu.js"></script>
<script src="../js/monitoramento.js"></script>
</body>
</html>
